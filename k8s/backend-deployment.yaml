apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: task-backend
        imagePullPolicy: Never
        ports:
          - containerPort: 8000
        env:
        - name: REDIS_HOST
          value: redis
